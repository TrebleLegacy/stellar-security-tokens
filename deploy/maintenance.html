<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radox — Maintenance</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0f;color:#e2e2e8;overflow:hidden}
.wrap{text-align:center;max-width:520px;padding:2rem;position:relative;z-index:1}
h1{font-size:1.6rem;margin-bottom:.75rem;letter-spacing:-.02em}
p{color:#888;line-height:1.7;font-size:.95rem}
.brand{font-size:.8rem;letter-spacing:.15em;color:#fdd924;margin-bottom:2rem;font-weight:600}
.glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(253,218,36,.06) 0%,transparent 70%);pointer-events:none}
a{color:#fdd924;text-decoration:none}
a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="glow"></div>
<div class="wrap">
<p class="brand">RADOX</p>
<h1>🔧 We are upgrading the platform</h1>
<p>We will be back shortly with improvements.<br>In the meantime, visit <a href="https://radox.net">radox.net</a> to learn more.</p>
</div>
</body>
</html>
